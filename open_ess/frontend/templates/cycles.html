{% extends "base.html" %}

{% block title %}Battery Cycles - OpenESS{% endblock %}

{% block content %}
<h1>Battery Efficiency</h1>

<div class="chart-container">
    <h2>Power vs Losses</h2>
    <div class="controls" style="margin-bottom: 1rem; padding: 0; background: transparent; box-shadow: none;">
        <label>
            Aggregation:
            <select id="scatter-aggregate-select">
                <option value="5">5 minutes</option>
                <option value="10" selected>10 minutes</option>
                <option value="15">15 minutes</option>
            </select>
        </label>
        <label>
            Data points:
            <select id="scatter-limit-select">
                <option value="500">500</option>
                <option value="1000">1000</option>
                <option value="2000" selected>2000</option>
                <option value="5000">5000</option>
            </select>
        </label>
    </div>
    <div id="scatter-chart" class="chart chart-large"></div>
</div>

<h2 style="margin-top: 2rem;">Charge Cycles</h2>

<div class="controls">
    <label>
        Time range:
        <select id="days-select">
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
        </select>
    </label>
    <label>
        Min SOC swing:
        <select id="swing-select">
            <option value="5">5%</option>
            <option value="10" selected>10%</option>
            <option value="20">20%</option>
            <option value="30">30%</option>
        </select>
    </label>
</div>

<div class="stats" id="cycle-stats">
    <!-- Filled by JS -->
</div>

<div class="table-container">
    <div class="table-header">
        <div class="column-picker">
            <button id="column-picker-btn" class="btn-icon" title="Select columns">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
            </button>
            <div id="column-picker-dropdown" class="column-picker-dropdown hidden">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>
    <div id="cycles-table"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/cycles.js"></script>
{% endblock %}
