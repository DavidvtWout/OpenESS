[build-system]
requires = [
    "setuptools>=60",
    "setuptools-scm>=8.0"
]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dynamic_ess*"]


[project]
name = "dynamic-ess"
description = "Victron dynamic ESS charge/discharge schedule optimizer for day-ahead prices."
version = "0.0.0"
authors = [{ name = "David van 't Wout", email = "david@vtwout.com" }]
dependencies = [
    "entsoe-apy",
    "fastapi",
    "jinja2",
    "numpy",
    "pandas",
    "pydantic",
    "pymodbus",
    "pyomo",
    "pyyaml",
    "uvicorn",
]

[project.optional-dependencies]
dev = ["black", "pre-commit"]

[project.scripts]
dynamic-ess = "dynamic_ess.main:main"
dynamic-ess-web = "dynamic_ess.web.cli:main"

[tool.black]
line-length = 120
