database:
  path: /var/lib/open-ess/data.db

prices:
  area:  # Required - ENTSO-E bidding zone (NL, DE_LU, BE, etc.)
  entsoe_api_key_file: /var/lib/open-ess/entsoe_api_key  # Required

  # Price formulas: calculate actual buy/sell price from market price
  # Use 'price' or 'p' as the market price variable (EUR/kWh)
  # Allowed operations: +, -, *, /, **, parentheses
  # Example: "(price + 0.05) * 1.21" adds €0.05/kWh markup and 21% VAT
  buy_formula:
  sell_formula:

victron_gx:
  host:  # Address of your Victron GX device
  port:  # Optional - Defaults to 502

  # Modbus unit IDs - check Settings → Services → Modbus TCP → Available services
  system_id: 100  # Defaults to 100
  grid_id: # Optional - com.victronenergy.grid contains some more grid metrics than com.victronenergy.system.
  pvinverter_id: # Optional - Read metrics from solar inverter. Solar data is only shown in the graphs but isn't actually used for scheduling.

battery:
  control:
    type: # victron or mqtt. Mqtt will be implemented soon.
    monitor_only: no  # Read-only mode. Only collect metric but don't actively control the battery.
    # victron;
    vebus_id: # Required
    battery_id: # Optional
    disable_charger_when_idle: # Default: False
    disable_inverter_when_idle: # Default: False
    # mqtt;
    topic: # Required

  capacity_kwh: # Required
  min_soc: 10   # Lowest State-of-Charge allowed
  max_soc: 100  # Highest State-of-Charge allowed

  # The charge and discharge power are measured on the AC side. The battery will
  # charge slight slower than the max charge power due to losses in the charger.
  # The load on the battery will be slightly higher than the max discharge power
  # due to losses in inverter.
  max_charge_power_kw: 3.0
  max_discharge_power_kw: 3.0
