name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: |
          set +e
          output=$(ruff check . --statistics 2>&1)
          exit_code=$?
          echo "## Ruff Lint Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit $exit_code

      - name: Ruff format check
        run: |
          set +e
          output=$(ruff format --check . 2>&1)
          exit_code=$?
          echo "## Ruff Format Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit $exit_code

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ".[fastapi]"

      - name: mypy
        run: |
          set +e
          output=$(mypy open_ess 2>&1)
          exit_code=$?
          echo "## mypy Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit $exit_code

  generated-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[fastapi]"

      - name: Check api.js is up to date
        run: |
          python -m open_ess.scripts.generate_types
          if ! git diff --exit-code open_ess/frontend/src/api.js; then
            echo "## Generated Types Check Failed" >> $GITHUB_STEP_SUMMARY
            echo "api.js is out of date. Run \`generate-types\` and commit." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## Generated Types Check" >> $GITHUB_STEP_SUMMARY
          echo "api.js is up to date." >> $GITHUB_STEP_SUMMARY

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest
