{% extends "base.html" %}

{% block title %}Dashboard - Dynamic ESS{% endblock %}

{% block content %}
<h1>Dashboard</h1>

<div class="controls">
    <label>
        Time range:
        <select id="range-select">
            <option value="24" selected>Today</option>
            <option value="48">Last 2 days</option>
            <option value="168">Last 7 days</option>
            <option value="720">Last 30 days</option>
        </select>
    </label>
</div>

<div class="chart-container">
    <h2>Power</h2>
    <div id="power-chart" class="chart"></div>
</div>

<div class="chart-container">
    <div class="chart-header">
        <h2>Energy Flow</h2>
        <div class="button-group" id="for-buttons">
            <button class="btn-toggle active" data-value="multiplus">MultiPlus</button>
            <button class="btn-toggle" data-value="grid">Grid</button>
            <button class="btn-toggle" data-value="consumption">Consumption</button>
        </div>
    </div>
    <div id="energy-chart" class="chart"></div>
</div>

<div class="chart-container">
    <h2>Prices</h2>
    <div id="prices-chart" class="chart"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
<script>
    function getAggregateMinutes(hours) {
        if (hours <= 48) return 5;
        if (hours <= 168) return 15;
        return 60;
    }

    function getBucketMinutes(hours) {
        if (hours <= 24) return 60;      // hourly
        if (hours <= 168) return 360;    // 6-hourly
        return 1440;                      // daily
    }

    // Store timestamps for alignment
    let dashboardStart = null;
    let dashboardEnd = null;
    let currentFoR = 'multiplus';
    let cachedEnergyData = null;

    function getTimeRange(hours) {
        const now = new Date();

        if (hours === 24) {
            // Today: 0:00 today to 0:00 tomorrow
            const start = new Date(now);
            start.setHours(0, 0, 0, 0);
            const end = new Date(start);
            end.setDate(end.getDate() + 1);
            return { start, end };
        } else {
            // Other ranges: aligned to midnight, ending now
            const start = new Date(now.getTime() - hours * 60 * 60 * 1000);
            start.setHours(0, 0, 0, 0);
            return { start, end: now };
        }
    }

    async function loadDashboard() {
        const hours = parseInt(document.getElementById('range-select').value);
        const aggregateMinutes = getAggregateMinutes(hours);
        const bucketMinutes = getBucketMinutes(hours);

        // Calculate time range
        const range = getTimeRange(hours);
        dashboardStart = range.start;
        dashboardEnd = range.end;

        // Clear cache when time range changes
        cachedEnergyData = null;

        loadPowerChart('power-chart', dashboardStart, dashboardEnd, aggregateMinutes);
        await loadAndCacheEnergyData(dashboardStart, dashboardEnd, bucketMinutes);
        renderEnergyFlowChart('energy-chart', cachedEnergyData, dashboardStart, dashboardEnd, currentFoR);
        loadPricesChartRange('prices-chart', dashboardStart, dashboardEnd);
    }

    async function loadAndCacheEnergyData(start, end, bucketMinutes) {
        const url = `/api/energy-flow?start=${start.toISOString()}&end=${end.toISOString()}&bucket_minutes=${bucketMinutes}`;

        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Failed to fetch energy flow: ${response.status}`);
            }
            cachedEnergyData = await response.json();
        } catch (error) {
            console.error('Error fetching energy data:', error);
            cachedEnergyData = null;
        }
    }

    function renderEnergyOnly() {
        if (cachedEnergyData && dashboardStart && dashboardEnd) {
            renderEnergyFlowChart('energy-chart', cachedEnergyData, dashboardStart, dashboardEnd, currentFoR);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('range-select').addEventListener('change', loadDashboard);

        // Frame of Reference button handlers
        document.querySelectorAll('#for-buttons .btn-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#for-buttons .btn-toggle').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFoR = btn.dataset.value;
                renderEnergyOnly();
            });
        });

        loadDashboard();
    });
</script>
{% endblock %}
