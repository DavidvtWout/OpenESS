{% extends "base.html" %}

{% block title %}Dashboard - Dynamic ESS{% endblock %}

{% block content %}
<h1>Dashboard</h1>

<div class="controls">
    <label>
        Time range:
        <select id="range-select">
            <option value="6">Last 6 hours</option>
            <option value="12">Last 12 hours</option>
            <option value="24" selected>Last 24 hours</option>
            <option value="48">Last 2 days</option>
            <option value="168">Last 7 days</option>
            <option value="720">Last 30 days</option>
        </select>
    </label>
</div>

<div class="chart-container">
    <h2>Power</h2>
    <div id="power-chart" class="chart"></div>
</div>

<div class="chart-container">
    <div class="chart-header">
        <h2>Energy Flow</h2>
        <div class="button-group" id="for-buttons">
            <button class="btn-toggle active" data-value="multiplus">MultiPlus</button>
            <button class="btn-toggle" data-value="grid">Grid</button>
            <button class="btn-toggle" data-value="consumption">Consumption</button>
        </div>
    </div>
    <div id="energy-chart" class="chart"></div>
</div>

<div class="chart-container">
    <h2>Prices</h2>
    <div id="prices-chart" class="chart"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
<script>
    function getAggregateMinutes(hours) {
        if (hours <= 12) return 1;
        if (hours <= 48) return 5;
        if (hours <= 168) return 15;
        return 60;
    }

    function getBucketMinutes(hours) {
        if (hours <= 24) return 60;      // hourly
        if (hours <= 168) return 360;    // 6-hourly
        return 1440;                      // daily
    }

    // Store timestamps for alignment
    let dashboardStart = null;
    let dashboardEnd = null;
    let currentFoR = 'multiplus';

    function getAlignedStartTime(hours) {
        const now = new Date();
        const start = new Date(now.getTime() - hours * 60 * 60 * 1000);

        // Align to midnight for ranges >= 24 hours
        if (hours >= 24) {
            start.setHours(0, 0, 0, 0);
        }
        return start;
    }

    function loadDashboard() {
        const hours = parseInt(document.getElementById('range-select').value);
        const aggregateMinutes = getAggregateMinutes(hours);
        const bucketMinutes = getBucketMinutes(hours);

        // Calculate aligned timestamps
        dashboardEnd = new Date();
        dashboardStart = getAlignedStartTime(hours);

        loadPowerChart('power-chart', dashboardStart, dashboardEnd, aggregateMinutes);
        loadEnergyFlowChart('energy-chart', dashboardStart, dashboardEnd, bucketMinutes, currentFoR);
        loadPricesChartRange('prices-chart', dashboardStart, dashboardEnd);
    }

    function loadEnergyOnly() {
        const hours = parseInt(document.getElementById('range-select').value);
        const bucketMinutes = getBucketMinutes(hours);

        if (dashboardStart && dashboardEnd) {
            loadEnergyFlowChart('energy-chart', dashboardStart, dashboardEnd, bucketMinutes, currentFoR);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('range-select').addEventListener('change', loadDashboard);

        // Frame of Reference button handlers
        document.querySelectorAll('#for-buttons .btn-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#for-buttons .btn-toggle').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFoR = btn.dataset.value;
                loadEnergyOnly();
            });
        });

        loadDashboard();
    });
</script>
{% endblock %}
