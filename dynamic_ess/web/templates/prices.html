{% extends "base.html" %}

{% block title %}Energy Prices - Dynamic ESS{% endblock %}

{% block content %}
<h1>Energy Prices</h1>

<div class="controls">
    <label>
        Days to show:
        <select id="days-select">
            <option value="1">1 day</option>
            <option value="2">2 days</option>
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
        </select>
    </label>
</div>

<div class="chart-container">
    <div id="prices-chart" class="chart chart-large"></div>
</div>

<div class="stats" id="price-stats">
    <!-- Filled by JS -->
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const daysSelect = document.getElementById('days-select');

        function updateChart() {
            const days = parseInt(daysSelect.value);
            loadPricesChart('prices-chart', days, true);
        }

        daysSelect.addEventListener('change', updateChart);
        updateChart();
    });
</script>
{% endblock %}
